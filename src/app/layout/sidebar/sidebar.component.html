<nav class="sidebar-glass d-flex flex-column gap-3 p-3">
  <!-- Brand -->
  <a class="navbar-brand fw-bold d-flex align-items-center gap-2 mb-4">
    <i class="bi bi-speedometer2 fs-5"></i> <span>Dashboard</span>
  </a>

  <ul class="nav flex-column gap-2">
    <!-- Leads -->
    <li *ngIf="userRoles.includes('admin') || userRoles.includes('superadmin')">
      <a routerLink="/leads" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-person-lines-fill"></i> <span>Leads</span>
      </a>
    </li>

    <!-- Deals -->
    <li *ngIf="userRoles.includes('admin') || userRoles.includes('superadmin')">
      <a routerLink="/deals" routerLinkActive="active"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-cash-coin"></i> <span>Deals</span>
      </a>
    </li>

    <!-- Contacts -->
    <li *ngIf="userRoles.includes('user') || userRoles.includes('admin') || userRoles.includes('superadmin')">
      <a routerLink="/contacts" routerLinkActive="active"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-people"></i> <span>Contacts</span>
      </a>
    </li>

    <!-- Companies -->
    <li *ngIf="userRoles.includes('user') || userRoles.includes('admin') || userRoles.includes('superadmin')">
      <a routerLink="/companies" routerLinkActive="active"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-buildings"></i> <span>Companies</span>
      </a>
    </li>

    <!-- Tasks -->
    <li>
      <a routerLink="/tasks" routerLinkActive="active"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-list-task"></i> <span>Tasks</span>
      </a>
    </li>

    <!-- Notes -->
    <li>
      <a routerLink="/notes" routerLinkActive="active"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-sticky"></i> <span>Notes</span>
      </a>
    </li>

    <!-- Events -->
    <li>
      <a routerLink="/events" routerLinkActive="active"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-calendar-event"></i> <span>Events</span>
      </a>
    </li>

    <!-- Users -->
    <li *ngIf="userRoles.includes('superadmin')">
      <a routerLink="/users" routerLinkActive="active"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-person-badge"></i> <span>Users</span>
      </a>
    </li>

    <!-- Role Permissions -->
    <li *ngIf="auth.hasRole('superadmin')">
      <a routerLink="/role-permissions" routerLinkActive="active"
         class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold">
        <i class="bi bi-shield-lock"></i> <span>Manage Permissions</span>
      </a>
    </li>

    <!-- Logout -->
    <li>
      <a class="nav-link d-flex align-items-center gap-2 py-1 px-2 fw-semibold"
         (click)="logout()" style="cursor:pointer;">
        <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
      </a>
    </li>
  </ul>
</nav>
