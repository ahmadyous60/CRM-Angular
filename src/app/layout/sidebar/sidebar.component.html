<div class="d-flex flex-column gap-2">
  <a class="navbar-brand fw-bold d-flex align-items-center gap-2 mb-3">
    <i class="bi bi-speedometer2"></i> Dashboard
  </a>

  <!-- Leads -->
  <a *ngIf="userRoles.includes('admin') || userRoles.includes('superadmin')"
     routerLink="/leads" routerLinkActive="active"
     class="nav-link px-3 py-2 d-flex align-items-center gap-2">
     <i class="bi bi-person-lines-fill"></i> Leads
  </a>

  <!-- Deals -->
  <a *ngIf="userRoles.includes('admin') || userRoles.includes('superadmin')"
     routerLink="/deals" routerLinkActive="active"
     class="nav-link px-3 py-2 d-flex align-items-center gap-2">
     <i class="bi bi-cash-coin"></i> Deals
  </a>

  <!-- Contacts -->
  <a *ngIf="userRoles.includes('user') || userRoles.includes('admin') || userRoles.includes('superadmin')"
     routerLink="/contacts" routerLinkActive="active"
     class="nav-link px-3 py-2 d-flex align-items-center gap-2">
     <i class="bi bi-people"></i> Contacts
  </a>

  <!-- Companies -->
  <a *ngIf="userRoles.includes('user') || userRoles.includes('admin') || userRoles.includes('superadmin')"
     routerLink="/companies" routerLinkActive="active"
     class="nav-link px-3 py-2 d-flex align-items-center gap-2">
     <i class="bi bi-buildings"></i> Companies
  </a>

  <!-- Tasks (All) -->
  <a routerLink="/tasks" routerLinkActive="active"
     class="nav-link px-3 py-2 d-flex align-items-center gap-2">
     <i class="bi bi-list-task"></i> Tasks
  </a>

  <!-- Notes (All) -->
  <a routerLink="/notes" routerLinkActive="active"
     class="nav-link px-3 py-2 d-flex align-items-center gap-2">
     <i class="bi bi-sticky"></i> Notes
  </a>

  <!-- Events (ALL) -->
  <a routerLink="/events" routerLinkActive="active"
     class="nav-link px-3 py-2 d-flex align-items-center gap-2">
     <i class="bi bi-calendar-event"></i> Events
  </a>

  <!-- Users (Only superadmin) -->
  <a *ngIf="userRoles.includes('superadmin')"
     routerLink="/users" routerLinkActive="active"
     class="nav-link px-3 py-2 d-flex align-items-center gap-2">
     <i class="bi bi-person-badge"></i> Users
  </a>

  <!-- Logout -->
  <a class="nav-link px-3 py-2 d-flex align-items-center gap-2"
     (click)="logout()" style="cursor:pointer;">
     <i class="bi bi-box-arrow-right"></i> Logout
  </a>
</div>
