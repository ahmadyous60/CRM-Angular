<div class="container">
  <h3>Manage Role Permissions</h3>

  <label>Select Role:</label>
  <select [(ngModel)]="selectedRole" (change)="loadRolePermissions()">
    <option *ngFor="let r of roles" [value]="r">{{ r | titlecase }}</option>
  </select>

  <div *ngIf="loading" class="mt-3">Loading permissions...</div>

  <table *ngIf="!loading" class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>Permission</th>
        <th>Assigned</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let perm of permissions">
        <td>{{ perm.name }}</td>
        <td>
          <input type="checkbox"
                 [checked]="perm.assigned"
                 (change)="togglePermission(selectedRole, perm.id, $event)" />
        </td>
      </tr>
    </tbody>
  </table>
</div>
