<div class="container py-5">
  <div *ngIf="errors.length > 0" class="alert alert-danger shadow-sm">
    <ul class="mb-0">
      <li *ngFor="let err of errors">{{ err }}</li>
    </ul>
  </div>

  <div class="card border-0 shadow-lg rounded-4 p-4 bg-light bg-opacity-75">
    <h3 class="mb-4 text-center fw-bold text-primary">
      <i class="bi bi-shield-lock-fill me-2"></i>Password Renewal
    </h3>

    <div *ngIf="!emailVerified" class="text-center">
      <p class="text-muted">Please confirm your email to proceed.</p>
      <button class="btn btn-outline-primary px-4" (click)="confirmEmail()">
        <i class="bi bi-envelope-check me-2"></i>Confirm Email
      </button>
    </div>

    <div *ngIf="emailVerified">
      <div class="mb-3">
        <label class="form-label fw-semibold">Old Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" [(ngModel)]="oldPassword" class="form-control" placeholder="Enter old password" />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">New Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
          <input type="password" [(ngModel)]="newPassword" class="form-control" placeholder="Enter new password" />
        </div>
      </div>

      <div class="text-end">
        <button class="btn btn-success px-4" (click)="changePassword()">
          <i class="bi bi-arrow-repeat me-2"></i>Change Password
        </button>
      </div>
    </div>
  </div>
</div>
